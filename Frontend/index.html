<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  
</head>
<body>

<div class="card">
  <!-- Login form -->
  <div id="login-view">
    <h2>Sign in</h2>
    <div class="error" id="error-msg">Invalid username or password.</div>
    <label>Username</label>
    <input id="username" type="text" placeholder="e.g. admin or jane" />
    <label>Password</label>
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <!-- Dashboard (shown after login) -->
  <div id="dashboard">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <div>
        <p id="welcome-name" style="font-size:15px; font-weight:500;"></p>
        <span id="role-badge" class="badge"></span>
      </div>
      <button onclick="logout()" style="width:auto; padding:6px 14px;">Logout</button>
    </div>

    <div class="panel">
      <h3>Your dashboard</h3>
      <p>Visible to all logged-in users.</p>
    </div>

    <!-- Only shown to admins -->
    <div class="panel" id="admin-panel" style="display:none; border-color:#fcd34d;">
      <h3 style="color:#92400e;">Admin panel</h3>
      <p id="admin-msg"></p>
    </div>
  </div>
</div>
</body>
</html>
